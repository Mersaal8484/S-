{% extends 'billing/base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-6">
        <h3>{{ title }}</h3>
    </div>
    <div class="col-md-6 text-left">
        <a href="{% url 'billing_period_list' %}" class="btn btn-secondary">Back</a>
    </div>
</div>

<form method="post">
    {% csrf_token %}
    <div class="card">
        <div class="card-body">
            <div class="form-group">
                <label>Period Name *</label>
                <input type="text" name="period_name" class="form-control" value="{{ period.period_name|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>Period Code *</label>
                <input type="text" name="period_code" class="form-control" value="{{ period.period_code|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>Start Date *</label>
                <input type="date" name="start_date" class="form-control" value="{{ period.start_date|date:'Y-m-d'|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>End Date *</label>
                <input type="date" name="end_date" class="form-control" value="{{ period.end_date|date:'Y-m-d'|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>Reading Start Date *</label>
                <input type="date" name="reading_start_date" class="form-control" value="{{ period.reading_start_date|date:'Y-m-d'|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>Reading End Date *</label>
                <input type="date" name="reading_end_date" class="form-control" value="{{ period.reading_end_date|date:'Y-m-d'|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>Billing Cycle</label>
                <select name="billing_cycle" class="form-control">
                    <option value="monthly" {% if period.billing_cycle == 'monthly' %}selected{% endif %}>Monthly</option>
                    <option value="bi_monthly" {% if period.billing_cycle == 'bi_monthly' %}selected{% endif %}>Bi-Monthly</option>
                    <option value="quarterly" {% if period.billing_cycle == 'quarterly' %}selected{% endif %}>Quarterly</option>
                </select>
            </div>
            {% if period %}
            <div class="form-group">
                <label>Status</label>
                <select name="status" class="form-control">
                    <option value="draft" {% if period.status == 'draft' %}selected{% endif %}>Draft</option>
                    <option value="reading_open" {% if period.status == 'reading_open' %}selected{% endif %}>Reading Open</option>
                    <option value="reading_closed" {% if period.status == 'reading_closed' %}selected{% endif %}>Reading Closed</option>
                    <option value="billing_in_progress" {% if period.status == 'billing_in_progress' %}selected{% endif %}>Billing In Progress</option>
                    <option value="billing_completed" {% if period.status == 'billing_completed' %}selected{% endif %}>Billing Completed</option>
                    <option value="closed" {% if period.status == 'closed' %}selected{% endif %}>Closed</option>
                </select>
            </div>
            {% endif %}
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'billing_period_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</form>
{% endblock %}
