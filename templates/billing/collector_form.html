{% extends 'billing/base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-6">
        <h3>{{ title }}</h3>
    </div>
    <div class="col-md-6 text-left">
        <a href="{% url 'collector_list' %}" class="btn btn-secondary">Back</a>
    </div>
</div>

<form method="post">
    {% csrf_token %}
    <div class="card">
        <div class="card-body">
            <div class="form-group">
                <label>Name *</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" class="form-control">
            </div>
            <div class="form-group">
                <label>Area</label>
                <input type="text" name="area" class="form-control">
            </div>
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'collector_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</form>
{% endblock %}
