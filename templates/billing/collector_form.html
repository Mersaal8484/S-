{% extends 'billing/base.html' %}
{% block title %}{{ title }} — المحصلون{% endblock %}

{% block extra_head %}
<style>
:root {
  --elec: #00d4ff; --elec2: #6366f1;
  --ok: #34d399; --warn: #fb923c; --danger: #f43f5e;
  --ink: #060d1f; --s0: #060d1f; --s1: #0d1b3e; --s2: #111c42; --s3: #1a2a5a;
  --t1: #e0f4ff; --t2: #94c8e0; --t3: #4a7a95;
  --border: rgba(0,212,255,0.15); --border2: rgba(0,212,255,0.3);
}
.form-page { max-width: 860px; margin: 0 auto; padding: 24px 0; }
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
.page-header-left { display:flex; align-items:center; gap:14px; }
.page-icon { width:48px; height:48px; background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(99,102,241,0.15)); border:1px solid var(--border2); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--elec); box-shadow:0 0 20px rgba(0,212,255,0.1); }
.page-title { font-size:22px; font-weight:800; color:var(--t1); line-height:1.2; }
.page-sub { font-size:12px; color:var(--t3); margin-top:2px; }
.btn-back { display:flex; align-items:center; gap:7px; padding:9px 18px; border-radius:11px; background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--t2); font-size:13px; font-weight:600; text-decoration:none; transition:all .2s; font-family:Cairo,sans-serif; }
.btn-back:hover { border-color:var(--elec); color:var(--elec); background:rgba(0,212,255,0.07); }
.form-card { background:var(--s1); border:1px solid var(--border); border-radius:20px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.4); }
.form-card-header { padding:20px 28px; border-bottom:1px solid var(--border); background:linear-gradient(135deg,rgba(0,212,255,0.06),rgba(99,102,241,0.04)); display:flex; align-items:center; gap:10px; }
.form-card-header .h-dot { width:8px; height:8px; border-radius:50%; background:var(--elec); box-shadow:0 0 10px var(--elec); }
.form-card-header h6 { margin:0; font-size:14px; font-weight:700; color:var(--t1); }
.form-card-body { padding:28px; }
.form-section { margin-bottom:28px; }
.section-label { font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--elec); margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid rgba(0,212,255,0.1); display:flex; align-items:center; gap:8px; }
.fgrid { display:grid; gap:16px; }
.fgrid-2 { grid-template-columns:1fr 1fr; }
.field { display:flex; flex-direction:column; gap:7px; }
.field-label { font-size:12px; font-weight:700; color:var(--t2); display:flex; align-items:center; gap:5px; }
.field-label .req { color:var(--danger); font-size:14px; }
.finput,.fselect,.ftextarea { width:100%; background:rgba(6,13,31,0.6); border:1px solid rgba(255,255,255,0.08); border-radius:11px; color:var(--t1); font-family:Cairo,sans-serif; font-size:14px; font-weight:500; padding:11px 14px; transition:all .2s; outline:none; text-align:right; }
.finput::placeholder,.ftextarea::placeholder { color:var(--t3); font-size:13px; }
.finput:focus,.fselect:focus,.ftextarea:focus { border-color:var(--elec); background:rgba(0,212,255,0.05); box-shadow:0 0 0 3px rgba(0,212,255,0.1); }
.finput:hover:not(:focus),.fselect:hover:not(:focus),.ftextarea:hover:not(:focus) { border-color:rgba(255,255,255,0.15); }
.ftextarea { resize:vertical; min-height:80px; line-height:1.6; }
.form-footer { padding:20px 28px; border-top:1px solid var(--border); display:flex; align-items:center; gap:12px; background:rgba(0,0,0,0.15); flex-wrap:wrap; }
.btn-save { display:flex; align-items:center; gap:8px; padding:12px 28px; border-radius:12px; background:linear-gradient(135deg,rgba(0,212,255,0.9),rgba(99,102,241,0.8)); border:none; color:var(--ink); font-size:14px; font-weight:800; cursor:pointer; font-family:Cairo,sans-serif; transition:all .25s; box-shadow:0 4px 20px rgba(0,212,255,0.25); }
.btn-save:hover { transform:translateY(-2px); box-shadow:0 6px 28px rgba(0,212,255,0.4); }
.btn-cancel { display:flex; align-items:center; gap:8px; padding:12px 22px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--t2); font-size:14px; font-weight:600; text-decoration:none; font-family:Cairo,sans-serif; transition:all .2s; }
.btn-cancel:hover { border-color:rgba(255,255,255,0.2); color:var(--t1); }
.save-hint { font-size:11px; color:var(--t3); margin-right:auto; }
@media(max-width:640px){ .fgrid-2{grid-template-columns:1fr;} .form-card-body,.form-footer{padding:18px;} }
</style>
{% endblock %}

{% block content %}
<div class="form-page">
  <div class="page-header">
    <div class="page-header-left">
      <div class="page-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div>
        <div class="page-title">{{ title }}</div>
        <div class="page-sub">إدارة المحصلين</div>
      </div>
    </div>
    <a href="{% url 'collector_list' %}" class="btn-back">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="9 18 15 12 9 6"/></svg>
      العودة للقائمة
    </a>
  </div>

  <form method="post" novalidate>
    {% csrf_token %}
    <div class="form-card">
      <div class="form-card-header">
        <span class="h-dot"></span>
        <h6>إضافة محصل جديد</h6>
      </div>
      <div class="form-card-body">

        <!-- البيانات الأساسية -->
        <div class="form-section" style="margin-bottom:0">
          <div class="fgrid fgrid-2">
            <div class="field">
              <label class="field-label">الاسم <span class="req">*</span></label>
              <input type="text" name="full_name_ar" class="finput" placeholder="اسم المحصل" required>
            </div>
            <div class="field">
              <label class="field-label">الجوال</label>
              <input type="text" name="mobile_phone" class="finput" placeholder="+967 7XX XXX XXXX" dir="ltr">
            </div>
          </div>
          <div class="fgrid">
            <div class="field">
              <label class="field-label">المنطقة / ملاحظات</label>
              <input type="text" name="notes" class="finput" placeholder="المنطقة الجغرافية أو ملاحظات أخرى">
            </div>
          </div>
        </div>

      </div>
      <div class="form-footer">
        <button type="submit" class="btn-save">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          حفظ البيانات
        </button>
        <a href="{% url 'collector_list' %}" class="btn-cancel">إلغاء</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
