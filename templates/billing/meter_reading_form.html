{% extends 'billing/base.html' %}
{% block title %}Reading Form{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <div class="card">
        <div class="card-header"><h5>Reading Form</h5></div>
        <div class="card-body">
            <div class="form-group">
                <label>Meter Number *</label>
                <input type="text" name="meter_number" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Current Reading *</label>
                <input type="number" name="current_reading" class="form-control" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Reading Date</label>
                <input type="date" name="reading_date" class="form-control" value="{{ today }}">
            </div>
            <div class="form-group">
                <label>Reader Name</label>
                <input type="text" name="reader_name" class="form-control">
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea name="notes" class="form-control" rows="2"></textarea>
            </div>
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary">Submit</button>
            <a href="{% url 'reading_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</form>
{% endblock %}
