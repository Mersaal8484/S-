{% extends 'billing/base.html' %}
{% block title %}SMS Template{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-6">
        <h3>SMS Template</h3>
    </div>
    <div class="col-md-6 text-left">
        <a href="{% url 'sms_template_list' %}" class="btn btn-secondary">Back</a>
    </div>
</div>

<form method="post">
    {% csrf_token %}
    <div class="card">
        <div class="card-body">
            <div class="form-group">
                <label>Template Type *</label>
                <select name="template_type" class="form-control" required>
                    <option value="">Select Type</option>
                    <option value="InvoiceCreated" {% if template.template_type == 'InvoiceCreated' %}selected{% endif %}>Invoice Created</option>
                    <option value="PaymentReceived" {% if template.template_type == 'PaymentReceived' %}selected{% endif %}>Payment Received</option>
                    <option value="BillDueSoon" {% if template.template_type == 'BillDueSoon' %}selected{% endif %}>Bill Due Soon</option>
                    <option value="BillOverdue" {% if template.template_type == 'BillOverdue' %}selected{% endif %}>Bill Overdue</option>
                    <option value="MeterReadingReminder" {% if template.template_type == 'MeterReadingReminder' %}selected{% endif %}>Meter Reading Reminder</option>
                    <option value="PaymentReminder" {% if template.template_type == 'PaymentReminder' %}selected{% endif %}>Payment Reminder</option>
                    <option value="WelcomeMessage" {% if template.template_type == 'WelcomeMessage' %}selected{% endif %}>Welcome Message</option>
                    <option value="Custom" {% if template.template_type == 'Custom' %}selected{% endif %}>Custom</option>
                </select>
            </div>
            <div class="form-group">
                <label>Title (AR) *</label>
                <input type="text" name="title_ar" class="form-control" value="{{ template.title_ar|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>Message Content (AR) *</label>
                <textarea name="content_template_ar" class="form-control" rows="5" required>{{ template.content_template_ar|default:'' }}</textarea>
                <small class="text-muted">Use {customer_name}, {amount}, {due_date}, etc. for variables</small>
            </div>
            <div class="form-group">
                <label>Language</label>
                <select name="language" class="form-control">
                    <option value="ar" {% if template.language == 'ar' %}selected{% endif %}>Arabic</option>
                    <option value="en" {% if template.language == 'en' %}selected{% endif %}>English</option>
                </select>
            </div>
            <div class="form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="isActive" {% if template.is_active %}checked{% endif %}>
                <label class="form-check-label" for="isActive">Active</label>
            </div>
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'sms_template_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</form>
{% endblock %}
