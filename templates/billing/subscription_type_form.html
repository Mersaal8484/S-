{% extends 'billing/base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<h3>{{ title }}</h3>

<form method="post" class="mt-4">
    {% csrf_token %}
    <div class="card">
        <div class="card-body">
            <div class="form-group">
                <label>Name (Arabic)</label>
                <input type="text" name="name_ar" class="form-control" value="{{ type.name_ar|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>Name (English)</label>
                <input type="text" name="name_en" class="form-control" value="{{ type.name_en|default:'' }}">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" class="form-control">{{ type.description|default:'' }}</textarea>
            </div>
            <div class="form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="isActive" {% if type.is_active or not type %}checked{% endif %}>
                <label class="form-check-label" for="isActive">Active</label>
            </div>
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'system_settings' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</form>
{% endblock %}
