{% extends 'base.html' %}

{% block title %}{{ title }} - elem{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h1>{{ title }}</h1>
        <a href="{% url 'journal_entry_list' %}" class="btn btn-secondary">Back</a>
    </div>
</div>

<form method="post">
    {% csrf_token %}
    <div class="row">
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Reference</label>
                <input type="text" name="reference" class="form-control">
            </div>
        </div>
    </div>
    
    <div class="form-group mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="2"></textarea>
    </div>
    
    <h4>Journal Lines</h4>
    <table class="table" id="lines-table">
        <thead>
            <tr>
                <th>Account</th>
                <th>Debit</th>
                <th>Credit</th>
            </tr>
        </thead>
        <tbody>
            {% for i in "012345"|make_list %}
            <tr>
                <td>
                    <select name="account_{{ i }}" class="form-control">
                        <option value="">Select Account</option>
                        {% for account in accounts %}
                        <option value="{{ account.pk }}">{{ account.code }} - {{ account.name }}</option>
                        {% endfor %}
                    </select>
                </td>
                <td><input type="number" step="0.01" name="debit_{{ i }}" class="form-control" placeholder="0.00"></td>
                <td><input type="number" step="0.01" name="credit_{{ i }}" class="form-control" placeholder="0.00"></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
    <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
