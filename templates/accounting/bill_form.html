{% extends 'base.html' %}

{% block title %}{{ title }} - النظام{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h1>{{ title }}</h1>
        <a href="{% url 'bill_list' %}" class="btn btn-secondary">العودة</a>
    </div>
</div>

<form method="post">
    {% csrf_token %}
    <div class="row">
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">المورد</label>
                <select name="vendor" class="form-control" required>
                    <option value="">اختر المورد</option>
                    {% for vendor in vendors %}
                    <option value="{{ vendor.pk }}">{{ vendor.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">التاريخ</label>
                <input type="date" name="date" class="form-control" required>
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">تاريخ الاستحقاق</label>
                <input type="date" name="due_date" class="form-control" required>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">المرجع</label>
                <input type="text" name="reference" class="form-control">
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">الحالة</label>
                <select name="status" class="form-control">
                    <option value="DRAFT">مسودة</option>
                    <option value="SUBMITTED">مقدمة</option>
                    <option value="PAID">مدفوعة</option>
                    <option value="CANCELLED">ملغاة</option>
                </select>
            </div>
        </div>
    </div>
    
    <div class="form-group mb-3">
        <label class="form-label">ملاحظات</label>
        <textarea name="notes" class="form-control" rows="2"></textarea>
    </div>
    
    <h4>بنود الفاتورة</h4>
    <table class="table">
        <thead>
            <tr>
                <th>المنتج</th>
                <th>الوصف</th>
                <th>الكمية</th>
                <th>سعر الوحدة</th>
                <th>المجموع</th>
            </tr>
        </thead>
        <tbody>
            {% for i in "01234"|make_list %}
            <tr>
                <td>
                    <select name="product_{{ i }}" class="form-control" onchange="fillProduct(this, {{ i }})">
                        <option value="">اختر المنتج</option>
                        {% for product in products %}
                        <option value="{{ product.pk }}" data-price="{{ product.cost_price }}" data-name="{{ product.name }}">{{ product.name }}</option>
                        {% endfor %}
                    </select>
                </td>
                <td><input type="text" name="description_{{ i }}" class="form-control" placeholder="الوصف"></td>
                <td><input type="number" step="0.01" name="quantity_{{ i }}" class="form-control" value="1" onchange="calcAmount({{ i }})"></td>
                <td><input type="number" step="0.01" name="unit_price_{{ i }}" class="form-control" placeholder="0.00" onchange="calcAmount({{ i }})"></td>
                <td><input type="number" step="0.01" name="amount_{{ i }}" class="form-control" readonly></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
    <script>
    function fillProduct(select, idx) {
        var option = select.options[select.selectedIndex];
        var price = option.getAttribute('data-price') || 0;
        var name = option.getAttribute('data-name') || '';
        document.querySelector('input[name="unit_price_' + idx + '"]').value = price;
        if (name && !document.querySelector('input[name="description_' + idx + '"]').value) {
            document.querySelector('input[name="description_' + idx + '"]').value = name;
        }
        calcAmount(idx);
    }
    function calcAmount(idx) {
        var qty = parseFloat(document.querySelector('input[name="quantity_' + idx + '"]').value) || 0;
        var price = parseFloat(document.querySelector('input[name="unit_price_' + idx + '"]').value) || 0;
        document.querySelector('input[name="amount_' + idx + '"]').value = (qty * price).toFixed(2);
    }
    </script>
    
    <button type="submit" class="btn btn-primary">حفظ</button>
</form>
{% endblock %}
