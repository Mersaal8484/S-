{% extends 'base.html' %}

{% block title %}{{ title }} - elem{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h1>{{ title }}</h1>
        <a href="{% url 'contract_list' %}" class="btn btn-secondary">Back</a>
    </div>
</div>

<form method="post">
    {% csrf_token %}
    
    <div class="row">
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Contract Name *</label>
                <input type="text" name="name" class="form-control" value="{{ contract.name|default:'' }}" required>
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Contract Number</label>
                <input type="text" name="contract_number" class="form-control" value="{{ contract.contract_number|default:'' }}">
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Customer</label>
                <select name="partner" class="form-control">
                    <option value="">-- Select Customer --</option>
                    {% for customer in customers %}
                    <option value="{{ customer.pk }}" {% if contract.partner_id == customer.pk %}selected{% endif %}>{{ customer.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Customer ID</label>
                <input type="text" name="partner_old_id" class="form-control" value="{{ contract.partner_old_id|default:'' }}">
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Meter Number</label>
                <input type="text" name="meter_number" class="form-control" value="{{ contract.meter_number|default:'' }}">
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Initial Reading</label>
                <input type="number" step="0.01" name="meter_first_reading" class="form-control" value="{{ contract.meter_first_reading|default:'0' }}">
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Meter Type</label>
                <select name="meter_type" class="form-control">
                    <option value="meck" {% if contract.meter_type == 'meck' %}selected{% endif %}>Mechanical</option>
                    <option value="elec" {% if contract.meter_type == 'elec' %}selected{% endif %}>Electronic</option>
                    <option value="ppay" {% if contract.meter_type == 'ppay' %}selected{% endif %}>Prepaid</option>
                </select>
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Meter Phase</label>
                <select name="meter_phase_type" class="form-control">
                    <option value="1vas" {% if contract.meter_phase_type == '1vas' %}selected{% endif %}>Single Phase</option>
                    <option value="3vas" {% if contract.meter_phase_type == '3vas' %}selected{% endif %}>Three Phase</option>
                    <option value="allvas" {% if contract.meter_phase_type == 'allvas' %}selected{% endif %}>Transformer</option>
                </select>
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Usage Type</label>
                <select name="meter_usage_type" class="form-control">
                    <option value="home" {% if contract.meter_usage_type == 'home' %}selected{% endif %}>Home</option>
                    <option value="trad" {% if contract.meter_usage_type == 'trad' %}selected{% endif %}>Commercial</option>
                    <option value="gover" {% if contract.meter_usage_type == 'gover' %}selected{% endif %}>Government</option>
                    <option value="manve" {% if contract.meter_usage_type == 'manve' %}selected{% endif %}>Industrial</option>
                    <option value="water" {% if contract.meter_usage_type == 'water' %}selected{% endif %}>Water Pump</option>
                    <option value="other" {% if contract.meter_usage_type == 'other' %}selected{% endif %}>Other</option>
                </select>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Meter Multiplier</label>
                <input type="number" step="0.01" name="meter_multiplier" class="form-control" value="{{ contract.meter_multiplier|default:'1' }}">
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Journal</label>
                <select name="journal" class="form-control">
                    <option value="">-- Select Journal --</option>
                    {% for journal in journals %}
                    <option value="{{ journal.pk }}" {% if contract.journal_id == journal.pk %}selected{% endif %}>{{ journal.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-check mt-4">
                <input type="checkbox" name="recurring_invoices" class="form-check-input" id="recurring_invoices"
                       {% if contract.recurring_invoices %}checked{% endif %}>
                <label class="form-check-label" for="recurring_invoices">Generate Recurring Invoices</label>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Recurrence</label>
                <select name="recurring_rule_type" class="form-control">
                    <option value="daily" {% if contract.recurring_rule_type == 'daily' %}selected{% endif %}>Daily</option>
                    <option value="weekly" {% if contract.recurring_rule_type == 'weekly' %}selected{% endif %}>Weekly</option>
                    <option value="monthly" {% if contract.recurring_rule_type == 'monthly' %}selected{% endif %}>Monthly</option>
                    <option value="yearly" {% if contract.recurring_rule_type == 'yearly' %}selected{% endif %}>Yearly</option>
                </select>
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Interval (Every X)</label>
                <input type="number" name="recurring_interval" class="form-control" value="{{ contract.recurring_interval|default:'1' }}">
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Invoicing Type</label>
                <select name="recurring_invoicing_type" class="form-control">
                    <option value="pre-paid" {% if contract.recurring_invoicing_type == 'pre-paid' %}selected{% endif %}>Pre-paid</option>
                    <option value="post-paid" {% if contract.recurring_invoicing_type == 'post-paid' %}selected{% endif %}>Post-paid</option>
                </select>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Connection Date</label>
                <input type="date" name="connection_date" class="form-control" value="{{ contract.connection_date|default:'' }}">
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Contract Date</label>
                <input type="date" name="contract_date" class="form-control" value="{{ contract.contract_date|default:'' }}">
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group mb-3">
                <label class="form-label">Next Invoice Date</label>
                <input type="date" name="recurring_next_date" class="form-control" value="{{ contract.recurring_next_date|default:'' }}">
            </div>
        </div>
    </div>
    
    <button type="submit" class="btn btn-primary">Save Contract</button>
</form>
{% endblock %}
