{% extends 'base.html' %}

{% block title %}{{ title }} - elem{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h1>{{ title }}</h1>
        <a href="{% url 'task_queue_list' %}" class="btn btn-secondary">Back</a>
    </div>
</div>

<form method="post">
    {% csrf_token %}
    <div class="row">
        <div class="col-md-6">
            <div class="form-group mb-3">
                <label class="form-label">Task Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
        </div>
        <div class="col-md-6">
            <div class="form-group mb-3">
                <label class="form-label">Task Type</label>
                <select name="task_type" class="form-control">
                    <option value="recurring_invoice">Recurring Invoice</option>
                    <option value="meter_reading">Meter Reading</option>
                    <option value="notification">Notification</option>
                    <option value="report">Report Generation</option>
                    <option value="custom">Custom</option>
                </select>
            </div>
        </div>
    </div>
    
    <div class="form-group mb-3">
        <label class="form-label">Payload (JSON)</label>
        <textarea name="payload" class="form-control" rows="6" placeholder='{"contract_id": 1, "amount": 100}'>{}</textarea>
        <small class="text-muted">Enter valid JSON for task parameters</small>
    </div>
    
    <button type="submit" class="btn btn-primary">Enqueue Task</button>
</form>
{% endblock %}
