{% extends 'base.html' %}

{% block title %}Confirm Delete - elem{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h1>Confirm Delete</h1>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <p>Are you sure you want to delete this {{ type|lower }}: <strong>{{ object.name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="javascript:history.back()" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
