{% extends 'base.html' %}

{% block title %}{{ title }} - elem{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h1>{{ title }}</h1>
        <a href="{% url 'integration_list' %}" class="btn btn-secondary">Back</a>
    </div>
</div>

<form method="post">
    {% csrf_token %}
    <div class="row">
        <div class="col-md-6">
            <div class="form-group mb-3">
                <label class="form-label">Integration Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
        </div>
        <div class="col-md-6">
            <div class="form-group mb-3">
                <label class="form-label">Provider Code</label>
                <input type="text" name="provider_code" class="form-control" required placeholder="e.g., stripe, twilio">
            </div>
        </div>
    </div>
    
    <div class="form-group mb-3">
        <label class="form-label">Category</label>
        <select name="category" class="form-control" required>
            {% for cat, label in categories %}
            <option value="{{ cat }}">{{ label }}</option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3"></textarea>
    </div>
    
    <div class="form-group mb-3">
        <label class="form-label">Documentation URL</label>
        <input type="url" name="documentation_url" class="form-control">
    </div>
    
    <button type="submit" class="btn btn-primary">Register Integration</button>
</form>
{% endblock %}
