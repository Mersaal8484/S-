{% extends 'base.html' %}

{% block title %}Delete Configuration - elem{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <h1>Delete Configuration</h1>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <p>Are you sure you want to delete configuration <strong>{{ config.name }}</strong> for <strong>{{ integration.name }}</strong>?</p>
        <p class="text-danger">This action cannot be undone.</p>

        <form method="post">
            {% csrf_token %}
            <a href="{% url 'integration_detail' pk=integration.pk %}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-danger">Delete</button>
        </form>
    </div>
</div>
{% endblock %}
