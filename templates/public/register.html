<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل شركة جديدة | S-B SaaS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/modern.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-dark text-white">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="text-center mb-5 mt-4">
                    <a href="/" class="text-decoration-none">
                        <h2 class="gradient-text font-weight-bold"><i class="bi bi-lightning-charge-fill"></i> S-B SaaS</h2>
                    </a>
                </div>
                
                <div class="f-card p-5" style="background: var(--glass);">
                    <h3 class="text-center mb-4 font-weight-bold">إنشاء حساب جديد</h3>
                    
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger bg-transparent border-danger text-danger py-2">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group mb-4">
                            <label class="text-dim">اسم الشركة</label>
                            <input type="text" name="company_name" class="form-control bg-transparent text-white border-secondary py-4" placeholder="مثلاً: شركة الفا للكهرباء" required style="border-radius: 12px;">
                        </div>
                        <div class="form-group mb-4">
                            <label class="text-dim">البريد الإلكتروني للإدارة</label>
                            <input type="email" name="email" class="form-control bg-transparent text-white border-secondary py-4" placeholder="admin@company.com" required style="border-radius: 12px;">
                        </div>
                        <div class="form-group mb-4">
                            <label class="text-dim">رقم الجوال</label>
                            <input type="text" name="phone" class="form-control bg-transparent text-white border-secondary py-4" dir="ltr" placeholder="+967 7x xxx xxxx" style="border-radius: 12px;">
                        </div>
                        <div class="form-group mb-4">
                            <label class="text-dim">كلمة المرور</label>
                            <input type="password" name="password" class="form-control bg-transparent text-white border-secondary py-4" required style="border-radius: 12px;">
                        </div>

                        <button type="submit" id="registerBtn" class="btn-main btn-block btn-lg py-3">
                            <span id="btnText">تأكيد التسجيل وبدء التجربة</span>
                            <span id="btnSpinner" style="display:none;">
                                <span class="spinner-border spinner-border-sm ml-2" role="status"></span>
                                جاري التجهيز...
                            </span>
                        </button>
                        <div id="processingMsg" class="mt-4" style="display:none;">
                            <div class="glass-card p-3" style="border-color: var(--primary);">
                                <div class="d-flex align-items-center mb-2">
                                    <span class="spinner-border spinner-border-sm ml-2 text-primary" role="status"></span>
                                    <small>جاري إنشاء قاعدة البيانات...</small>
                                </div>
                                <div class="progress" style="height: 4px; background: rgba(255,255,255,0.1);">
                                    <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%; background: var(--primary);"></div>
                                </div>
                                <div class="mt-2 text-center">
                                    <small class="text-dim">قد تستغرق العملية دقيقة أثناء تجهيز بيئة العمل الآمنة</small>
                                </div>
                            </div>
                        </div>
                    </form>
                    <script>
                    document.querySelector('form').addEventListener('submit', function(e) {
                        var btn = document.getElementById('registerBtn');
                        var txt = document.getElementById('btnText');
                        var spin = document.getElementById('btnSpinner');
                        var msg = document.getElementById('processingMsg');
                        btn.disabled = true;
                        btn.style.cursor = 'not-allowed';
                        btn.style.opacity = '0.8';
                        txt.style.display = 'none';
                        spin.style.display = 'inline';
                        msg.style.display = 'block';
                    });
                    </script>
                    
                    <div class="text-center mt-4">
                        <p class="text-dim">لديك حساب بالفعل؟ <a href="/admin/" class="text-primary">تسجيل الدخول</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
