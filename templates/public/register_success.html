<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم التسجيل بنجاح | S-B SaaS</title>
    {% load bootstrap4 %}
    {% bootstrap_css %}
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0">تم التسجيل بنجاح!</h4>
                    </div>
                    <div class="card-body text-center">
                        <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
                        <h3 class="my-3">مرحباً {{ tenant.company_name }}</h3>
                        <p>تم إنشاء حسابك بنجاح. يمكنك الدخول عبر الرابط التالي:</p>
                        {% if domain %}
                        <a href="http://{{ domain.domain }}" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> الدخول للنظام
                        </a>
                        {% endif %}
                        <hr>
                        <p class="text-muted">بريد المدير: {{ tenant.email }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
